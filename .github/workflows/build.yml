name: Build Multi-Platform

on:
  push:
    branches: ["main", "master"]
    paths:
      - "VERSION"
      - ".github/workflows/build.yml"
      - "ghost_hunter.py"
      - "ghosthunter_app/**"
      - "installer.nsi"
  workflow_dispatch:

jobs:
  build-windows:
    name: Build Windows
    runs-on: windows-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~\AppData\Local\pip\Cache
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Build Windows EXE
        shell: bash
        run: |
          ICON_ARG=""
          if [[ -f ghosthunter.ico ]]; then
            ICON_ARG="--icon ghosthunter.ico"
          fi
          python -m PyInstaller \
            --noconfirm --onefile --windowed \
            --name "GhostHunterPro" \
            --collect-all webview \
            --add-data "ghosthunter_app/ui/ghost_hunter_ui.html;ghosthunter_app/ui" \
            $ICON_ARG \
            ghost_hunter.py

      - name: Build NSIS installer
        shell: bash
        run: |
          choco install nsis --no-progress -y
          powershell.exe -Command "& 'C:\Program Files (x86)\NSIS\makensis.exe' /DAPP_VERSION=${{ env.VERSION }} installer.nsi"

      - name: Build Windows portable zip
        shell: powershell
        run: |
          New-Item -ItemType Directory -Force -Path release-windows | Out-Null
          Copy-Item dist\GhostHunterPro.exe release-windows\GhostHunterPro.exe -Force
          Copy-Item README.md release-windows\README.md -Force
          Compress-Archive -Path release-windows\* -DestinationPath "GhostHunterPro-Portable-${{ env.VERSION }}.zip" -Force

      - name: Upload Windows portable EXE
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-exe-${{ env.VERSION }}
          path: dist/GhostHunterPro.exe

      - name: Upload Windows portable zip
        uses: actions/upload-artifact@v4
        with:
          name: windows-portable-zip-${{ env.VERSION }}
          path: GhostHunterPro-Portable-${{ env.VERSION }}.zip

      - name: Upload Windows installer
        uses: actions/upload-artifact@v4
        with:
          name: windows-installer-${{ env.VERSION }}
          path: GhostHunterPro-Setup-*.exe

  build-linux:
    name: Build Linux (.deb + portable)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/.cache/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib
          sudo apt-get update
          sudo apt-get install -y dpkg-dev

      - name: Build Linux binary
        shell: bash
        run: |
          python -m PyInstaller \
            --noconfirm --onefile --windowed \
            --name "GhostHunterPro" \
            --collect-all webview \
            --add-data "ghosthunter_app/ui/ghost_hunter_ui.html:ghosthunter_app/ui" \
            ghost_hunter.py

      - name: Build portable tar.gz
        shell: bash
        run: |
          mkdir -p linux-portable
          cp dist/GhostHunterPro linux-portable/GhostHunterPro
          chmod +x linux-portable/GhostHunterPro
          tar -czf "GhostHunterPro-${{ env.VERSION }}-linux.tar.gz" -C linux-portable .

      - name: Build .deb package
        shell: bash
        run: |
          PKGROOT="ghosthunterpro_${{ env.VERSION }}_amd64"
          mkdir -p "$PKGROOT/DEBIAN"
          mkdir -p "$PKGROOT/opt/GhostHunterPro"
          mkdir -p "$PKGROOT/usr/bin"
          cat > "$PKGROOT/DEBIAN/control" <<EOF
          Package: ghosthunterpro
          Version: ${{ env.VERSION }}
          Section: utils
          Priority: optional
          Architecture: amd64
          Maintainer: GhostHunterPro
          Depends: libgtk-3-0
          Description: Ghost Hunter Pro
           Desktop tool for finding and cleaning leftover game files.
          EOF
          cp dist/GhostHunterPro "$PKGROOT/opt/GhostHunterPro/GhostHunterPro"
          chmod 755 "$PKGROOT/opt/GhostHunterPro/GhostHunterPro"
          cat > "$PKGROOT/usr/bin/ghosthunterpro" <<'EOF'
          #!/bin/sh
          exec /opt/GhostHunterPro/GhostHunterPro "$@"
          EOF
          chmod 755 "$PKGROOT/usr/bin/ghosthunterpro"
          dpkg-deb --build "$PKGROOT"

      - name: Upload Linux portable tar.gz
        uses: actions/upload-artifact@v4
        with:
          name: linux-portable-${{ env.VERSION }}
          path: GhostHunterPro-${{ env.VERSION }}-linux.tar.gz

      - name: Upload Linux .deb
        uses: actions/upload-artifact@v4
        with:
          name: linux-deb-${{ env.VERSION }}
          path: ghosthunterpro_${{ env.VERSION }}_amd64.deb

  build-macos:
    name: Build macOS
    runs-on: macos-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Cache pip
        uses: actions/cache@v4
        with:
          path: ~/Library/Caches/pip
          key: ${{ runner.os }}-pip-${{ hashFiles('requirements.txt') }}
          restore-keys: |
            ${{ runner.os }}-pip-

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -r requirements.txt pyinstaller pyinstaller-hooks-contrib

      - name: Build macOS app
        shell: bash
        run: |
          ICON_ARG=""
          if [[ -f ghosthunter.icns ]]; then
            ICON_ARG="--icon ghosthunter.icns"
          fi
          python -m PyInstaller \
            --noconfirm --windowed \
            --name "GhostHunterPro" \
            --collect-all webview \
            --add-data "ghosthunter_app/ui/ghost_hunter_ui.html:ghosthunter_app/ui" \
            $ICON_ARG \
            ghost_hunter.py

      - name: Build macOS zip
        shell: bash
        run: |
          ditto -c -k --sequesterRsrc --keepParent "dist/GhostHunterPro.app" "GhostHunterPro-${{ env.VERSION }}-macOS.zip"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: macos-${{ env.VERSION }}
          path: GhostHunterPro-${{ env.VERSION }}-macOS.zip

  release:
    name: Create Draft Release
    needs: [build-windows, build-linux, build-macos]
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Read version
        shell: bash
        run: |
          RAW=$(cat VERSION | tr -d '\r\n')
          echo "VERSION=${RAW#v}" >> $GITHUB_ENV

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: release-assets

      - name: List assets
        run: find release-assets -type f | sort

      - name: Create draft release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.VERSION }}
          name: Ghost Hunter Pro v${{ env.VERSION }}
          draft: true
          files: release-assets/**/*
