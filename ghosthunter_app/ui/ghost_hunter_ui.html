<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Ghost Hunter Pro</title>
  <style>
    @font-face {
      font-family: 'GH Roboto Slab';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/roboto-slab-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Roboto Slab';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/roboto-slab-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Atkinson Hyperlegible';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/atkinson-hyperlegible-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Atkinson Hyperlegible';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/atkinson-hyperlegible-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH DM Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/dm-mono-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH DM Mono';
      font-style: normal;
      font-weight: 500 700;
      font-display: swap;
      src: url('./fonts/dm-mono-medium.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH JetBrains Mono';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/jetbrains-mono-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH JetBrains Mono';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/jetbrains-mono-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Roboto Condensed';
      font-style: normal;
      font-weight: 400;
      font-display: swap;
      src: url('./fonts/roboto-condensed-regular.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Roboto Condensed';
      font-style: normal;
      font-weight: 700;
      font-display: swap;
      src: url('./fonts/roboto-condensed-bold.ttf') format('truetype');
    }

    @font-face {
      font-family: 'GH Franktur';
      font-style: normal;
      font-weight: 400 700;
      font-display: swap;
      src: url('./fonts/unifrakturmaguntia-regular.ttf') format('truetype');
    }

    :root {
      --bg: #070b14;
      --panel: rgba(18, 25, 42, 0.82);
      --panel-2: rgba(23, 33, 54, 0.9);
      --border: rgba(255,255,255,0.08);
      --text: #ecf2fb;
      --muted: #8a96ad;
      --cyan: #1ac7ff;
      --cyan-2: #0bb2e3;
      --purple: #a24cff;
      --brand-mid: #6aa7ff;
      --brand-end: #b883ff;
      --glow-cyan: rgba(26,199,255,.18);
      --glow-purple: rgba(162,76,255,.12);
      --surface-cyan: rgba(17,183,223,.18);
      --surface-purple: rgba(162,76,255,.16);
      --surface-cyan-strong: rgba(17,183,223,.24);
      --surface-purple-strong: rgba(162,76,255,.22);
      --green: #22c76e;
      --red: #ff5b57;
      --shadow: 0 20px 60px rgba(0,0,0,.38);
      --radius: 18px;
      --app-font-stack: Inter, Segoe UI, system-ui, -apple-system, sans-serif;
    }



    .lucide-icon {
      width: 1em;
      height: 1em;
      stroke: currentColor;
      fill: none;
      stroke-width: 2;
      stroke-linecap: round;
      stroke-linejoin: round;
      vertical-align: -0.15em;
    }

    .icon-inline {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      margin-right: 7px;
    }

    .preset-modal-card {
      width: min(440px, 100%);
      background: rgba(11, 16, 28, .97);
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 22px;
      box-shadow: 0 32px 90px rgba(0,0,0,.46), 0 0 26px var(--glow-cyan);
      padding: 18px;
      animation: tvOpen .22s ease-out;
    }

    .preset-modal-input {
      width: 100%;
      height: 46px;
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 14px;
      background: rgba(255,255,255,.045);
      color: var(--text);
      padding: 0 13px;
      outline: none;
      font-size: 15px;
      font-weight: 800;
    }

    .preset-list {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(170px, 1fr));
      gap: 12px;
      margin-top: 10px;
    }

    .preset-card {
      position: relative;
      border: 1px solid rgba(255,255,255,.08);
      border-radius: 16px;
      background: rgba(255,255,255,.035);
      padding: 10px;
      color: var(--text);
      text-align: left;
      cursor: pointer;
      transition: .16s ease;
    }
    .preset-card[draggable="true"] {
      cursor: grab;
    }
    .preset-card[draggable="true"]:active {
      cursor: grabbing;
    }
    .preset-card.dragging {
      opacity: 0.4;
      transform: scale(0.95);
      transition: opacity .15s ease, transform .15s ease;
    }
    .preset-card.drag-over {
      border-color: var(--cyan);
      box-shadow: 0 0 16px var(--glow-cyan);
      transform: scale(1.02);
      transition: border-color .15s ease, box-shadow .15s ease, transform .15s ease;
    }
    .preset-card.drag-over::before {
      content: '';
      position: absolute;
      left: -4px;
      top: 0;
      bottom: 0;
      width: 3px;
      background: var(--cyan);
      border-radius: 2px;
      box-shadow: 0 0 8px var(--cyan);
    }

    .preset-card:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--cyan) 20%, transparent);
      box-shadow: 0 0 16px var(--glow-cyan);
    }
    .preset-card.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 20px var(--glow-cyan), 0 0 40px var(--glow-purple), inset 0 0 12px var(--glow-cyan);
    }
    body[data-theme-mode="light"] .preset-card.selected {
      border-color: var(--cyan);
      box-shadow: 0 0 16px color-mix(in srgb, var(--cyan) 40%, transparent), 0 0 32px color-mix(in srgb, var(--purple) 20%, transparent);
      background: linear-gradient(135deg, color-mix(in srgb, var(--cyan) 8%, white), color-mix(in srgb, var(--purple) 5%, white));
    }

    .preset-card-preview {
      height: 48px;
      border-radius: 10px;
      margin-bottom: 8px;
      border: none;
      background: linear-gradient(135deg, #0a1322, var(--preset-color), var(--preset-color2, color-mix(in srgb, var(--preset-color) 65%, #fb7185)));
    }

    .preset-card-name {
      font-size: 13px;
      font-weight: 900;
      padding-right: 58px;
      line-height: 1.3;
      display: flex;
      align-items: center;
      min-height: 20px;
    }

    .inline-editor-section {
      margin-top: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
      display: grid;
      gap: 12px;
    }

    .preset-card.expanded {
      border-color: color-mix(in srgb, var(--cyan) 25%, transparent);
      z-index: 2;
      box-shadow: 0 0 20px var(--glow-cyan);
      background: rgba(255,255,255,.05);
    }

    .preset-edit-body {
      display: none;
      margin-top: 10px;
      padding-top: 10px;
      border-top: 1px solid rgba(255,255,255,.06);
    }

    .preset-card.expanded .preset-edit-body {
      display: grid;
      gap: 8px;
    }

    .preset-card.expanded {
      border-color: color-mix(in srgb, var(--cyan) 25%, transparent);
      box-shadow: 0 0 16px var(--glow-cyan);
    }

    .preset-edit-row {
      display: flex;
      gap: 8px;
      align-items: center;
      flex-wrap: wrap;
    }

    .preset-edit-name-input {
      flex: 1 1 auto;
      min-width: 0;
      height: 34px;
      border: 1px solid rgba(255,255,255,.1);
      border-radius: 10px;
      background: rgba(0,0,0,.2);
      color: var(--text);
      padding: 0 10px;
      font-size: 13px;
      font-weight: 800;
      outline: none;
    }

    .preset-edit-actions {
      display: flex;
      gap: 6px;
      margin-top: 4px;
    }

    .preset-edit-btn {
      appearance: none;
      border: 1px solid rgba(255,255,255,.12);
      border-radius: 10px;
      padding: 6px 12px;
      font-size: 12px;
      font-weight: 800;
      cursor: pointer;
      transition: .14s ease;
    }

    .preset-edit-btn.save {
      background: rgba(34,199,110,.18);
      border-color: rgba(34,199,110,.28);
      color: #c3ffdb;
    }

    .preset-edit-btn.save:hover {
      background: rgba(34,199,110,.3);
    }

    .preset-edit-btn.cancel {
      background: rgba(255,255,255,.06);
      color: var(--muted);
    }

    .preset-edit-btn.cancel:hover {
      background: rgba(255,255,255,.1);
      color: var(--text);
    }

    .preset-card .theme-card-main {
      min-height: 0;
      display: block;
      padding-bottom: 2px;
    }

    .preset-delete {
      position: absolute;
      right: 8px;
      top: 8px;
      width: 25px;
      height: 25px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 9px;
      background: rgba(7,11,20,.85);
      color: #ffd8d6;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      backdrop-filter: blur(6px);
      transition: .14s ease;
    }

    .preset-delete:hover {
      background: rgba(255,91,87,.45);
      border-color: rgba(255,91,87,.4);
    }

    .preset-select {
      position: absolute;
      right: 68px;
      top: 8px;
      width: 25px;
      height: 25px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 9px;
      background: rgba(7,11,20,.85);
      color: #cdd8ec;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      backdrop-filter: blur(6px);
      transition: .14s ease;
    }
    .preset-select:hover {
      background: rgba(255,255,255,.2);
      color: #fff;
    }
    .preset-select.active {
      background: rgba(34,199,110,.2);
      border-color: rgba(34,199,110,.3);
      color: #c3ffdb;
    }

    .preset-rename {
      position: absolute;
      right: 38px;
      top: 8px;
      width: 25px;
      height: 25px;
      border: 1px solid rgba(255,255,255,.18);
      border-radius: 9px;
      background: rgba(7,11,20,.85);
      color: #cdd8ec;
      display: grid;
      place-items: center;
      cursor: pointer;
      box-shadow: 0 2px 8px rgba(0,0,0,.4);
      backdrop-filter: blur(6px);
      transition: .14s ease;
    }

    .preset-rename:hover {
      background: rgba(255,255,255,.2);
      color: #fff;
    }

    .preset-card-name-wrap {
      display: flex;
      align-items: center;
      gap: 6px;
      padding-right: 58px;
    }

    .preset-rename-input {
      flex: 1 1 auto;
      min-width: 0;
      height: 28px;
      border: 1px solid color-mix(in srgb, var(--cyan) 30%, transparent);
      border-radius: 8px;
      background: rgba(0,0,0,.3);
      color: var(--text);
      padding: 0 8px;
      font-size: 13px;
      font-weight: 900;
      outline: none;
    }

    .custom-edit-btn {
      position: relative;
      isolation: isolate;
      overflow: hidden;
      margin-top: 12px;
      width: 100%;
      justify-content: center;
      color: #fff;
      border-color: color-mix(in srgb, var(--cyan) 44%, transparent);
      background:
        radial-gradient(circle at 18% 50%, color-mix(in srgb, var(--cyan) 28%, transparent), transparent 34%),
        linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--cyan) 10%, transparent),
        0 0 26px var(--glow-cyan),
        0 0 20px var(--glow-purple),
        inset 0 0 0 1px rgba(255,255,255,.06);
      animation: customEditGlow 2.4s ease-in-out infinite;
    }

    .custom-edit-btn::after {
      content: "";
      position: absolute;
      inset: -40% auto -40% -55%;
      width: 54%;
      z-index: -1;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,.20), transparent);
      transform: rotate(18deg);
      transition: .24s ease;
    }

    .custom-edit-btn:hover {
      transform: translateY(-1px);
      border-color: color-mix(in srgb, var(--cyan) 64%, transparent);
      box-shadow:
        0 0 0 1px color-mix(in srgb, var(--cyan) 18%, transparent),
        0 0 38px var(--glow-cyan),
        0 0 28px var(--glow-purple),
        inset 0 0 0 1px rgba(255,255,255,.10);
    }

    .custom-edit-btn:hover::after {
      left: 110%;
    }

    @keyframes customEditGlow {
      0%, 100% { filter: brightness(1); }
      50% { filter: brightness(1.16); }
    }

    .second-color-toggle {
      border-color: color-mix(in srgb, var(--cyan) 22%, rgba(255,255,255,.08));
      background: rgba(255,255,255,.045);
      color: var(--text);
      box-shadow: inset 0 0 0 1px rgba(255,255,255,.035), 0 0 12px color-mix(in srgb, var(--cyan) 10%, transparent);
    }

    .second-color-toggle.active {
      color: #fff;
      border-color: color-mix(in srgb, var(--cyan) 36%, transparent);
      background: linear-gradient(90deg, var(--surface-cyan-strong), var(--surface-purple-strong));
      box-shadow: 0 0 18px var(--glow-cyan), inset 0 0 0 1px rgba(255,255,255,.06);
    }

    .custom-theme-modal-card {
      width: min(900px, 100%);
      max-height: calc(100vh - 56px);
      overflow: auto;
      background: rgba(11, 16, 28, .96);
      border: 1px solid rgba(255,255,255,.09);
      border-radius: 24px;
      box-shadow: 0 40px 100px rgba(0,0,0,.45), 0 0 30px var(--glow-cyan);
      animation: tvOpen .24s ease-out;
    }

    .custom-theme-modal-head {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      gap: 16px;
      padding: 18px;
      border-bottom: 1px solid rgba(255,255,255,.06);
      background: linear-gradient(180deg, rgba(11,16,28,.98), rgba(11,16,28,.92));
    }

    .custom-theme-modal-body {
      padding: 18px;
      display: grid;
      gap: 16px;
    }

    .custom-theme-modal-preview {
      width: 100%;
      height: 124px;
      min-height: 124px;
      border-radius: 18px;
      border: none;
      background:
        radial-gradient(circle at 18% 26%, color-mix(in srgb, var(--custom-accent, #d946ef) 48%, transparent), transparent 34%),
        linear-gradient(135deg, #0a1322, var(--custom-accent, #d946ef) 58%, var(--custom-shade-accent, var(--custom-accent-2, #fb7185)));
      box-shadow: 0 0 30px var(--glow-cyan);
    }

    * { box-sizing: border-box; }
    html, body { height: 100%; }

    .font-size-slider-wrap {
      display: flex;
      align-items: center;
      gap: 14px;
      padding: 14px;
      border-radius: 16px;
      border: 1px solid rgba(255,255,255,.07);
      background: rgba(255,255,255,.03);
    }

    .font-size-slider-wrap label {
      font-size: 13px;
      font-weight: 800;
      color: var(--muted);
      white-space: nowrap;
      min-width: 80px;
    }

    .font-size-slider {
      flex: 1 1 auto;
      -webkit-appearance: none;
      appearance: none;
      height: 6px;
      border-radius: 999px;
      background: linear-gradient(90deg, color-mix(in srgb, var(--cyan) 30%, transparent), color-mix(in srgb, var(--purple) 30%, transparent));
      outline: none;
      cursor: pointer;
    }

    .font-size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: 0 0 12px var(--glow-cyan);
      cursor: pointer;
      transition: box-shadow .15s ease;
    }

    .font-size-slider::-webkit-slider-thumb:hover {
      box-shadow: 0 0 20px var(--glow-cyan);
    }

    .font-size-slider::-moz-range-thumb {
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: linear-gradient(135deg, var(--cyan), var(--purple));
      border: 2px solid rgba(255,255,255,.18);
      box-shadow: 0 0 12px var(--glow-cyan);
      cursor: pointer;
    }

    .font-size-value {
      font-size: 15px;
      font-weight: 900;
      color: var(--text);
      min-width: 46px;
      text-align: right;
      font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
    }

    button,
    input,
    select,
    textarea {
      font-family: inherit;
    }
    body {
      margin: 0;
      color: var(--text);
      font-family: var(--app-font-stack);
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(84,25,166,0.12), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(24,163,211,0.08), transparent 75%),
        linear-gradient(180deg, #08101b 0%, #070b14 100%);
      overflow: hidden;
    }

    body[data-theme="midnight"] {
      --cyan: #7bd7ff;
      --cyan-2: #4fb9ff;
      --purple: #6f8dff;
      --brand-mid: #7ea8ff;
      --brand-end: #9cb4ff;
      --glow-cyan: rgba(79,185,255,.18);
      --glow-purple: rgba(111,141,255,.12);
      --surface-cyan: rgba(79,185,255,.16);
      --surface-purple: rgba(111,141,255,.14);
      --surface-cyan-strong: rgba(79,185,255,.24);
      --surface-purple-strong: rgba(111,141,255,.22);
      --red: #ff6b7a;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(44,81,165,0.16), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(45,130,188,0.10), transparent 75%),
        linear-gradient(180deg, #081019 0%, #09111d 100%);
    }



    body[data-theme="rubellite"] {
      --cyan: #ff4b75;
      --cyan-2: #660011;
      --purple: #b3133b;
      --brand-mid: #a30f32;
      --brand-end: #ff4b75;
      --glow-cyan: rgba(102,0,17,.30);
      --glow-purple: rgba(179,19,59,.18);
      --surface-cyan: rgba(102,0,17,.22);
      --surface-purple: rgba(179,19,59,.18);
      --surface-cyan-strong: rgba(102,0,17,.32);
      --surface-purple-strong: rgba(179,19,59,.28);
      --red: #ff5f8f;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(102,0,17,0.26), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(179,19,59,0.12), transparent 75%),
        linear-gradient(180deg, #110817 0%, #090712 100%);
    }

    body[data-theme="custom"] {
      --cyan: var(--custom-accent, #d946ef);
      --cyan-2: var(--custom-accent, #d946ef);
      --purple: var(--custom-accent-2, #fb7185);
      --brand-mid: var(--custom-accent, #d946ef);
      --brand-end: var(--custom-accent-2, #fb7185);
      --glow-cyan: color-mix(in srgb, var(--custom-accent, #d946ef) 22%, transparent);
      --glow-purple: color-mix(in srgb, var(--custom-accent-2, #fb7185) 16%, transparent);
      --surface-cyan: color-mix(in srgb, var(--custom-accent, #d946ef) 17%, transparent);
      --surface-purple: color-mix(in srgb, var(--custom-accent-2, #fb7185) 15%, transparent);
      --surface-cyan-strong: color-mix(in srgb, var(--custom-accent, #d946ef) 26%, transparent);
      --surface-purple-strong: color-mix(in srgb, var(--custom-accent-2, #fb7185) 22%, transparent);
      background:
        radial-gradient(900px 500px at 50% 40%, color-mix(in srgb, var(--custom-accent, #d946ef) 16%, transparent), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, color-mix(in srgb, var(--custom-accent-2, #fb7185) 10%, transparent), transparent 75%),
        linear-gradient(180deg, #080b14 0%, #070812 100%);
    }

    body[data-theme="ember"] {
      --cyan: #ffb26b;
      --cyan-2: #ff8a3d;
      --purple: #ff4d6d;
      --brand-mid: #ff9a52;
      --brand-end: #ff6884;
      --glow-cyan: rgba(255,138,61,.18);
      --glow-purple: rgba(255,77,109,.12);
      --surface-cyan: rgba(255,138,61,.16);
      --surface-purple: rgba(255,77,109,.14);
      --surface-cyan-strong: rgba(255,138,61,.24);
      --surface-purple-strong: rgba(255,77,109,.22);
      --red: #ff5b57;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(150,39,53,0.15), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(201,102,29,0.10), transparent 75%),
        linear-gradient(180deg, #120b0c 0%, #0c0b13 100%);
    }

    /* Theme mode: Dark / Light / System */
    body[data-theme-mode="light"] {
      --bg: #f0f2f7;
      --panel: rgba(255, 255, 255, 0.95);
      --panel-2: rgba(245, 247, 250, 0.96);
      --border: rgba(0,0,0,0.1);
      --text: #2d3748;
      --muted: #4b5563;
      --shadow: 0 4px 20px rgba(0,0,0,.06);
      color-scheme: light;
      background:

    body[data-theme="emerald"] {
      --cyan: #4fffd1;
      --cyan-2: #1fd0a6;
      --purple: #3fbf7c;
      --brand-mid: #6ef8d6;
      --brand-end: #66dd9b;
      --glow-cyan: rgba(31,208,166,.18);
      --glow-purple: rgba(63,191,124,.12);
      --surface-cyan: rgba(31,208,166,.16);
      --surface-purple: rgba(63,191,124,.14);
      --surface-cyan-strong: rgba(31,208,166,.24);
      --surface-purple-strong: rgba(63,191,124,.22);
      --red: #ff6f61;
      background:
        radial-gradient(900px 500px at 50% 40%, rgba(27,123,91,0.14), transparent 70%),
        radial-gradient(700px 500px at 50% 20%, rgba(33,181,126,0.08), transparent 75%),
        linear-gradient(180deg, #07130f 0%, #07100d 100%);

    body::before {
      content: "";
      position: fixed;
      inset: 0;
      pointer-events: none;
      background-image:
        linear-gradient(rgba(32, 54, 88, 0.18) 1px, transparent 1px),
        linear-gradient(90deg, rgba(32, 54, 88, 0.18) 1px, transparent 1px);
      background-size: 80px 80px;
      mask-image: linear-gradient(to bottom, rgba(255,255,255,.85), rgba(255,255,255,.35));
    }

    * {
      scrollbar-width: thin;
      scrollbar-color: rgba(106, 131, 170, .7) rgba(255,255,255,.04);
    }

    *::-webkit-scrollbar {
      width: 10px;
      height: 10px;
    }

    *::-webkit-scrollbar-track {
      background: rgba(255,255,255,.04);
      border-radius: 999px;
    }

    *::-webkit-scrollbar-thumb {
      background: linear-gradient(180deg, rgba(108,128,161,.92), rgba(80,98,128,.92));
      border-radius: 999px;
      border: 2px solid rgba(255,255,255,.04);
    }

    *::-webkit-scrollbar-thumb:hover {
      background: linear-gradient(180deg, rgba(132,153,190,.96), rgba(95,113,146,.96));
    }

    .app {
      position: relative;
      height: 100%;
      display: flex;
      flex-direction: column;
    }

    .topbar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 24px 28px 18px;

      gap: 14px;

      height: 28px;

      line-height: 1;

      -webkit-text-fill-color: transparent;

      border: 1px solid rgba(255,255,255,.08);

      box-shadow: inset 0 0 0 1px rgba(255,255,255,.03), 0 0 28px var(--glow-cyan);
      backdrop-filter: blur(12px);

      border: 0;
      background: transparent;
      color: var(--muted);
      font-weight: 800;
      font-size: 15px;
      padding: 12px 20px;
      border-radius: 14px;
      cursor: pointer;
      transition: .2s ease;

      box-shadow: 0 0 18px var(--glow-cyan), inset 0 1px 0 rgba(255,255,255,.05);

    .tab-icon {
      display: inline-flex;
      align-items: center;
      justify-content: center;

        '"': '&quot;',
        "'": '&#39;'
      }[char]));
    }

    function markdownInline(value) {
      let text = escapeHtml(value);
      text = text.replace(/`([^`]+)`/g, '<code>$1</code>');
      text = text.replace(/\*\*([^*]+)\*\*/g, '<strong>$1</strong>');
      text = text.replace(/__([^_]+)__/g, '<strong>$1</strong>');
      text = text.replace(/(^|\s)\*([^*\n]+)\*/g, '$1<em>$2</em>');
      text = text.replace(/(^|\s)_([^_\n]+)_/g, '$1<em>$2</em>');
      text = text.replace(/\[([^\]]+)\]\((https?:\/\/[^\s)]+)\)/g, '<a href="$2">$1</a>');
      return text;
    }

    function markdownToHtml(markdown) {
      const lines = String(markdown || '').replace(/\r\n/g, '\n').split('\n');
      const html = [];
      let listType = null;
      const closeList = () => {
        if (listType) {
          html.push(`</${listType}>`);
          listType = null;
        }
      };
      for (const rawLine of lines) {
        const line = rawLine.trimEnd();
        if (!line.trim()) {
          closeList();
          continue;
        }
        const heading = line.match(/^(#{1,3})\s+(.+)$/);
        if (heading) {
          closeList();
          const level = heading[1].length;
          html.push(`<h${level}>${markdownInline(heading[2].trim())}</h${level}>`);
          continue;
        }
        const unordered = line.match(/^[-*+]\s+(.+)$/);
        if (unordered) {
          if (listType !== 'ul') {
            closeList();
            listType = 'ul';
            html.push('<ul>');
          }
          html.push(`<li>${markdownInline(unordered[1])}</li>`);
          continue;
        }
        const ordered = line.match(/^\d+[.)]\s+(.+)$/);
        if (ordered) {
          if (listType !== 'ol') {
            closeList();
            listType = 'ol';
            html.push('<ol>');
          }
          html.push(`<li>${markdownInline(ordered[1])}</li>`);
          continue;
        }
        closeList();
        html.push(`<p>${markdownInline(line.trim())}</p>`);
      }
      closeList();
      return html.join('');
    }

    function formatSize(size) {
      const num = Number(size || 0);
      if (!num) return '0 B';
      const units = ['B', 'KB', 'MB', 'GB', 'TB'];
      let value = num;
      let idx = 0;
      while (value >= 1024 && idx < units.length - 1) {
        value /= 1024;
        idx += 1;
      }
      return `${value.toFixed(1)} ${units[idx]}`;
    }

    function toast(message, options = {}) {
      $toast.textContent = message;
      $toast.classList.add('show');
      clearTimeout(toast._timer);
      // A sticky toast stays visible until the next toast() or hideToast().
      if (!options.sticky) {
        toast._timer = setTimeout(() => $toast.classList.remove('show'), 2200);
      }
    }

    function restoreHomeInputFocus(caretPos = null) {

      const input = document.getElementById('home-search-input');
      if (!input) return;
      const safePos = Math.max(0, Math.min(desired, input.value.length));
      if (document.activeElement !== input) {

    async function waitForBackend() {
      if (window.pywebview && window.pywebview.api) return true;
      return new Promise(resolve => {
        let done = false;
        const finish = value => {
          if (done) return;
          done = true;
          resolve(value);
        };
        document.addEventListener('pywebviewready', () => finish(true), { once: true });
        const poll = setInterval(() => {
          if (window.pywebview && window.pywebview.api) {
            clearInterval(poll);
            finish(true);
          }
        }, 100);
        setTimeout(() => {
          clearInterval(poll);
          finish(!!(window.pywebview && window.pywebview.api));
        }, 3500);
      });
    }

    async function apiCall(method, ...args) {
      if (!(window.pywebview && window.pywebview.api && window.pywebview.api[method])) {
        throw new Error('Desktop backend not available');
      }
      return window.pywebview.api[method](...args);
    }

    function categoryIcon(category) {
      if (category.startsWith('Crack Leftovers')) return icon('search');

      if (category === 'Config Files') return icon('settings');
      if (category === 'Save & Config Files') return icon('save');
      if (category === 'NVIDIA') return icon('monitor');
      if (category === 'Documents' || category === 'Public Documents') return icon('file');
      if (category === 'Saved Games') return icon('save');
      if (category === 'Temp Files') return icon('trash');
      return icon('folder');
    }

    function groupedPaths(paths) {
      const groups = new Map();
      for (const path of paths || []) {
        const list = groups.get(path.category) || [];

      }
      return [...groups.entries()].sort((a, b) => a[0].localeCompare(b[0]));

    function getFilteredLibraryItems() {
      const query = state.libraryQuery.trim().toLowerCase();
      return state.libraryItems.filter(item => {
        if (state.libraryFilter === 'visible' && item.archived) return false;
        if (state.libraryFilter === 'hidden' && !item.archived) return false;
        const chosen = state.librarySourceFilter || []; const sources = (item.installed_sources || []).map(x => String(x).toLowerCase());
        if (chosen.length && !(chosen.includes('local') && !sources.length) && !sources.some(x => chosen.includes(x))) return false;
        if (!query) return true;
        return item.name.toLowerCase().includes(query) || String(item.appid).includes(query);
      });

    async function updateSuggestions(query, caretPos = null) {
      const raw = query == null ? '' : String(query);
      const clean = raw.trim();
      const caret = typeof caretPos === 'number' ? caretPos : raw.length;
      state.homeCursor = caret;

      if (clean.length < 2) {
        state.homeSuggestions = [];
        renderHomeSuggestionsOnly();
        restoreHomeInputFocus(caret);
        return;
      }
      try {
        const suggestions = await apiCall('search_suggestions', clean);
        const currentInput = document.getElementById('home-search-input');
        const liveValue = currentInput && typeof currentInput.value === 'string' ? currentInput.value : state.homeQuery;
        if (liveValue !== raw) return;

    function normalizeHexColor(value, fallback = '#d946ef') {
      let raw = String(value || '').trim();
      if (!raw) return fallback;
      if (!raw.startsWith('#')) raw = `#${raw}`;
      if (/^#[0-9a-fA-F]{3}$/.test(raw)) {
        raw = '#' + raw.slice(1).split('').map(char => char + char).join('');
      }
      return /^#[0-9a-fA-F]{6}$/.test(raw) ? raw.toLowerCase() : fallback;
    }

    function shiftHexColor(hex, amount = 34) {
      const value = normalizeHexColor(hex).slice(1);
      const channels = [0, 2, 4].map(index => parseInt(value.slice(index, index + 2), 16));
      const shifted = channels.map((channel, index) => {
        const delta = index === 0 ? amount : index === 1 ? -Math.round(amount / 3) : Math.round(amount / 2);
        return Math.max(0, Math.min(255, channel + delta));
      });
      return '#' + shifted.map(channel => channel.toString(16).padStart(2, '0')).join('');
    }

    function applyCustomThemeColor(color, color2 = null, useSecond = null) {
      const accent = normalizeHexColor(color);
      const secondEnabled = useSecond === null
        ? !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color)
        : !!useSecond;
      const second = normalizeHexColor(color2 || (state.settingsInfo && state.settingsInfo.custom_theme_color_2) || shiftHexColor(accent));
      document.body.style.setProperty('--custom-accent', accent);
      document.body.style.setProperty('--custom-accent-2', second);
      document.body.style.setProperty('--custom-shade-accent', secondEnabled ? second : shiftHexColor(accent));
    }

    function applyTheme(themeName) {
      applyCustomThemeColor(
        state.settingsInfo && state.settingsInfo.custom_theme_color ? state.settingsInfo.custom_theme_color : '#d946ef',
        state.settingsInfo && state.settingsInfo.custom_theme_color_2 ? state.settingsInfo.custom_theme_color_2 : '#fb7185',
        state.settingsInfo && state.settingsInfo.custom_theme_use_second_color
      );
      document.body.dataset.theme = themeName || 'neon';
    }

    function applyFont(fontName) {
      document.body.dataset.font = fontName || 'inter';
    }

    function applyFontSize(size) {
      const pct = Math.max(75, Math.min(130, Number(size || 100)));
      document.body.style.zoom = (pct / 100);
    }

    async function setTheme(themeName) {
      if (!state.settingsInfo) state.settingsInfo = {};
      state.settingsInfo.theme = themeName;
      if (themeName !== 'custom') state.loadedPresetName = null;
      applyTheme(themeName);
      renderSettings();
      try {
        const response = await apiCall('set_theme', themeName);
        if (response && response.ok) {
          state.settingsInfo.theme = response.theme;
          applyTheme(response.theme);
        }
      } catch {}
    }

    async function setFont(fontName) {
      const response = await apiCall('set_font', fontName);
      if (response && response.ok) {
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.font = response.font;
        applyFont(response.font);
        renderSettings();
      }
    }

    async function setCustomThemeColor(color, options = {}) {
      const normalized = normalizeHexColor(color);
      const second = normalizeHexColor(options.color2 || (state.settingsInfo && state.settingsInfo.custom_theme_color_2) || '#fb7185');
      const useSecond = options.useSecond !== undefined ? !!options.useSecond : !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color);
      try {
        const response = await apiCall('set_custom_theme_color', normalized, second, useSecond);
        if (!response.ok) throw new Error(response.error || 'Invalid color');
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color = response.custom_theme_color;
        state.settingsInfo.custom_theme_color_2 = response.custom_theme_color_2 || second;
        state.settingsInfo.custom_theme_use_second_color = !!response.custom_theme_use_second_color;
        state.settingsInfo.theme = response.theme || 'custom';
        applyCustomThemeColor(response.custom_theme_color, state.settingsInfo.custom_theme_color_2, state.settingsInfo.custom_theme_use_second_color);
        applyTheme(response.theme || 'custom');
        // No automatic renders — callers must handle their own.
      } catch (error) {
        toast(error.message || 'Could not set custom color');
      }
    }

    function scheduleCustomThemeColorSave(color) {
      clearTimeout(customThemeSaveTimer);
      customThemeSaveTimer = setTimeout(async () => {
        await setCustomThemeColor(color, {
          color2: state.settingsInfo && state.settingsInfo.custom_theme_color_2,
          useSecond: state.settingsInfo && state.settingsInfo.custom_theme_use_second_color,
          render: false,
          refreshEditor: false,
        });
        // Keep the currently loaded preset in sync with main-bar edits so
        // re-selecting it later does not restore stale colors.
        autoSavePresetColors();
      }, 260);
    }

    async function saveCustomThemePreset(name, color) {
      const presets = (state.settingsInfo && state.settingsInfo.custom_theme_presets) || [];
      const cleanName = String(name || '').trim();
      const exists = presets.some(p => p.name.toLowerCase() === cleanName.toLowerCase());
      if (exists) {
        const ok = await showConfirm({
          title: 'Replace existing preset?',
          message: `A preset named "${cleanName}" already exists. Do you want to replace it with the current colors?`,
          confirmText: 'Replace',
          cancelText: 'Cancel',
        });
        if (!ok) return;
      }
      try {
        const response = await apiCall(
          'save_custom_theme_preset',
          cleanName,
          color,
          state.settingsInfo && state.settingsInfo.custom_theme_color_2 ? state.settingsInfo.custom_theme_color_2 : '#fb7185',
          !!(state.settingsInfo && state.settingsInfo.custom_theme_use_second_color)
        );
        if (!response.ok) throw new Error(response.error || 'Could not save theme');
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color = response.custom_theme_color;
        state.settingsInfo.custom_theme_color_2 = response.custom_theme_color_2 || state.settingsInfo.custom_theme_color_2 || '#fb7185';
        state.settingsInfo.custom_theme_use_second_color = !!response.custom_theme_use_second_color;
        state.settingsInfo.custom_theme_presets = response.custom_theme_presets || [];
        state.settingsInfo.theme = response.theme || 'custom';
        state.presetDialogOpen = false;
        state.presetName = '';
        state.loadedPresetName = cleanName;
        applyCustomThemeColor(response.custom_theme_color, state.settingsInfo.custom_theme_color_2, state.settingsInfo.custom_theme_use_second_color);
        applyTheme('custom');
        try { await apiCall('set_custom_theme_color', response.custom_theme_color, state.settingsInfo.custom_theme_color_2 || '#fb7185', !!state.settingsInfo.custom_theme_use_second_color); } catch {}
        renderPresetDialog();
        renderCustomThemeEditor();
        toast(exists ? 'Theme replaced' : 'Theme saved');
      } catch (error) {
        toast(error.message || 'Could not save theme');
      }
    }

    async function renameCustomThemePreset(oldName, newName) {
      try {
        const response = await apiCall('rename_custom_theme_preset', oldName, newName);
        if (!response.ok) throw new Error(response.error || 'Could not rename preset');
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_presets = response.custom_theme_presets || [];
        // Update loaded preset name so auto-save tracks the new name.

    function autoSavePresetColors() {

    function closeOverlayAnimated(root) {
      // Play the TV-off animation, then remove the node.
      if (!root || root.classList.contains('closing')) return;
      root.classList.remove('opening');
      root.classList.add('closing');
      setTimeout(() => root.remove(), 190);
    }

    function renderEditGameDialog() {
      let root = document.getElementById('edit-game-overlay');
      if (!state.editingLibraryGameId) {
        closeOverlayAnimated(root);
        return;
      }
      const item = state.libraryItems.find(x => String(x.appid) === String(state.editingLibraryGameId));
      if (!item) return;
      if (root && root.classList.contains('closing')) { root.remove(); root = null; }
      if (!root) {
        root = document.createElement('div');
        root.id = 'edit-game-overlay';
        root.className = 'edit-game-overlay opening';
        document.body.appendChild(root);
        setTimeout(() => root && root.classList.remove('opening'), 320);

      root.innerHTML = `

    function sortLibraryItems() {
      // Mirror the backend order: visible first, unknowns last, then A-Z.
      state.libraryItems.sort((a, b) => {
        const arch = (a.archived ? 1 : 0) - (b.archived ? 1 : 0);
        if (arch) return arch;
        const unk = (a.is_unknown ? 1 : 0) - (b.is_unknown ? 1 : 0);
        if (unk) return unk;
        return String(a.name || '').toLowerCase().localeCompare(String(b.name || '').toLowerCase());
      });
    }

    function insertLibraryItem(game) {
      // Add or update a single card in place; never trigger a full rescan.
      if (!game || !game.appid) return;
      const record = {
        is_unknown: false,
        is_custom: game.is_custom !== false,
        appid: String(game.appid),
        name: game.name || `Game (${game.appid})`,
        developers: game.developers || [],
        publishers: game.publishers || [],
        header_image: game.header_image || '',
        short_description: game.short_description || '',
        paths: game.paths || [],
        path_count: game.path_count != null ? game.path_count : (game.paths || []).length,
        total_size: game.total_size || 0,
        archived: false,
        hidden: false,
        installed_sources: game.sources || game.installed_sources || [],
        installed: game.installed !== false,
        has_leftovers: !!(game.has_leftovers || (game.paths || []).length),
      };
      const idx = state.libraryItems.findIndex(item => String(item.appid) === record.appid);
      if (idx >= 0) state.libraryItems[idx] = { ...state.libraryItems[idx], ...record };
      else state.libraryItems.push(record);
      sortLibraryItems();
      if (state.activeTab === 'library') {
        renderLibrary();
        renderTabs();
      }
    }

    function closeCustomThemeEditorAnimated() {
      if (!state.customThemeEditorOpen || state.customThemeEditorClosing) return;
      state.customThemeEditorClosing = true;
      state.renamingPreset = null;
      state.renamingPresetValue = '';
      if (document.activeElement) document.activeElement.blur();
      renderCustomThemeEditor();
      setTimeout(() => {
        state.customThemeEditorOpen = false;
        state.customThemeEditorClosing = false;
        renderCustomThemeEditor();
      }, 190);
    }

    function updateCustomThemeEditorState() {
      // Lightweight DOM update: toggle glow/edit classes without rebuilding innerHTML.
      // This prevents the color picker from closing and avoids visual "flashing".
      const presets = $customTheme.querySelectorAll('[data-preset-card]');
      presets.forEach(card => {
        const name = card.dataset.presetCard || '';
        const isActive = !!(state.loadedPresetName && name.toLowerCase() === state.loadedPresetName.toLowerCase());
        // Cards are rendered with the 'selected' class, not 'active'.
        card.classList.toggle('selected', isActive);
        const isEditing = state.editingPresetName && name.toLowerCase() === state.editingPresetName.toLowerCase();
        card.classList.toggle('expanded', isEditing);
      });
      // Update active dot indicators
      const dots = $customTheme.querySelectorAll('.preset-active-dot');
      dots.forEach(dot => {
        const name = dot.dataset.presetDotName || '';
        const isActive = state.loadedPresetName && name.toLowerCase() === state.loadedPresetName.toLowerCase();
        dot.style.display = isActive ? '' : 'none';
      });
      // Update second-color toggle button state if present
      const toggleBtn = $customTheme.querySelector('[data-action="toggle-custom-second-color"]');
      if (toggleBtn && state.settingsInfo) {
        const nv = !!state.settingsInfo.custom_theme_use_second_color;
        toggleBtn.classList.toggle('active', nv);
        toggleBtn.textContent = nv ? 'Second Color: On' : 'Second Color: Off';
        const c2Row = $customTheme.querySelector('.second-color-row');
        if (c2Row) c2Row.style.display = nv ? '' : 'none';
      }
    }

    function renderCustomThemeEditor() {
      if (!state.customThemeEditorOpen && !state.customThemeEditorClosing) {
        $customTheme.classList.remove('show', 'closing');
        $customTheme.innerHTML = '';
        return;
      }
      // Guard: NEVER rebuild while user is interacting inside the overlay.
      // If the overlay already has content and we're in an active interaction
      // (color picker open, or clicking inside the modal), do a lightweight
      // class-only update instead of a full innerHTML rebuild.
      if (colorPickerOpen) {
        return;
      }
      // If overlay is already showing and the user is mid-interaction
      // (a preset card or input is focused), do a lightweight update.
      const focused = document.activeElement;
      const isInsideEditor = focused && $customTheme.contains(focused);
      if (state.customThemeEditorOpen && !state.customThemeEditorClosing
          && $customTheme.querySelector('.custom-theme-modal-card')
          && isInsideEditor) {
        updateCustomThemeEditorState();
        return;
      }
      const info = state.settingsInfo || {};
      const color = normalizeHexColor(info.custom_theme_color || '#d946ef');
      $customTheme.classList.add('show');
      $customTheme.classList.toggle('closing', !!state.customThemeEditorClosing);
      // Backdrop click to close
      $customTheme.onclick = function(e) {
        if (e.target === $customTheme) closeCustomThemeEditorAnimated();
      };
      $customTheme.innerHTML = `
        <div class="custom-theme-modal-card card" role="dialog" aria-modal="true">
          <div class="custom-theme-modal-head">
            <div>
              <h3 class="selection-title" style="margin-bottom:6px;">Custom Theme Editor</h3>
              <div class="selection-sub">Fine-tune your accent color, save named presets, and reload or delete saved themes.</div>
            </div>

          </div>
          <div class="custom-theme-modal-body">
            ${customThemeEditorHtml()}
          </div>
        </div>
      `;
    }

      const aboutTab = `

    function renderAll(options = {}) {
      renderHome();
      renderLibrary();
      // Don't rebuild settings from renderAll — it causes visual glitches
      // like wrong theme showing as active. Settings only rebuilds when
      // explicitly triggered (tab switch, theme/font change, etc.)
      renderTabs();
      renderModal();
      renderSelectionReview();
      renderConfirm();
      renderPresetDialog();
      renderUpdateNotice();
      renderAddLibraryDialog();
    }

    async function refreshLibrary(options = {}) {
      const keepModal = options.keepModal !== false;
      const forceRescan = options.forceRescan === true;
      const background = options.background === true;
      if (background) {
        state.libraryPreloading = true;
      } else {
        state.libraryLoading = true;
        renderAll();
      }
      try {
        const response = await apiCall(forceRescan ? 'rescan_library' : 'scan_library');
        if (!response.ok) throw new Error(response.error || 'Failed to scan library');
        state.libraryItems = response.items || [];
        state.libraryLoaded = true;
      } catch (error) {
        toast(error.message || 'Library scan failed');
      } finally {
        state.libraryLoading = false;
        state.libraryPreloading = false;
        syncSelectedLibraryIds();
        if (keepModal && state.modalGameId && !state.libraryItems.some(item => String(item.appid) === String(state.modalGameId))) {
          state.modalGameId = null;
        }
        renderAll();
        updateLibraryScrollButton();
      }
    }

    async function runHomeSearch() {
      const input = document.getElementById('home-search-input');
      const rawQuery = input && typeof input.value === 'string' ? input.value : '';
      const query = rawQuery.trim();
      if (!query) return;
      state.homeQuery = rawQuery;
      state.homeLoading = true;
      state.homeResult = null;
      state.homeSuggestions = [];
      renderAll();
      try {
        const response = await apiCall('home_search', query);
        if (!response.ok) throw new Error(response.error || 'Search failed');
        state.homeResult = response;
        await loadHistory();
      } catch (error) {
        toast(error.message || 'Search failed');
      } finally {
        state.homeLoading = false;
        renderAll();
      }
    }

    async function deletePaths(paths, flags = {}) {
      if (!paths.length) {
        toast('Nothing selected');
        return;
      }
      const ok = await showConfirm({
        title: 'Confirm deletion',
        message: `Delete ${paths.length} selected path(s)?\n\nThis action cannot be undone.`,
        confirmText: 'Delete',
        cancelText: 'Cancel',
      });
      if (!ok) return;
      try {
        const response = await apiCall('delete_paths', paths);
        const failedCount = (response.failed || []).length;
        toast(failedCount ? `Deleted ${response.deleted} path(s), ${failedCount} failed` : `Deleted ${response.deleted} path(s)`);
        if (flags.refreshHome && state.homeQuery) {
          await runHomeSearch();
        }
        if (flags.refreshLibrary) {
          await refreshLibrary();
        }
      } catch (error) {
        toast(error.message || 'Delete failed');
      }
    }

    async function toggleArchive(appid, currentlyArchived) {
      try {
        await apiCall('set_archived', String(appid), !currentlyArchived);
        const item = state.libraryItems.find(game => String(game.appid) === String(appid));
        if (item) item.archived = !currentlyArchived;
        renderLibrary();
        renderTabs();
        if (state.modalGameId && String(state.modalGameId) === String(appid)) {
          renderModal();
        }
      } catch {
        toast('Hide/show action failed');
      }
    }

    document.addEventListener('submit', async event => {
      if (event.target && event.target.id === 'home-search-form') {
        event.preventDefault();
        await runHomeSearch();
      }
    });

    document.addEventListener('mousedown', event => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.closest('.suggestion')) {
        event.preventDefault();
      }
    });

    document.addEventListener('change', event => {
      const t = event.target;
      if (t.type === 'color' && t.closest('#custom-theme-overlay')) {
        colorPickerOpen = false;
        openColorPickerEl = null;
      }
    });

    // Toggle behavior for the native color picker: the OS popup cannot be
    // closed by script, but a second click on the same swatch is intercepted
    // so the picker does not immediately re-open — which reads as "close".
    let openColorPickerEl = null;
    document.addEventListener('click', event => {
      const t = event.target;
      if (t instanceof HTMLElement && t.matches('input[type="color"]') && t.closest('#custom-theme-overlay')) {
        if (openColorPickerEl === t) {
          event.preventDefault();
          openColorPickerEl = null;
          colorPickerOpen = false;
        } else {
          openColorPickerEl = t;
        }
        return;
      }
      // Any other click means the native popup has been dismissed.
      openColorPickerEl = null;
    }, true);

    document.addEventListener('click', event => {
      const menu = document.getElementById('library-source-menu');
      if (menu && menu.open && !menu.contains(event.target)) {
        state.sourceMenuOpen = false;
        menu.removeAttribute('open');
      }
    });

    function positionSourceMenu() {
      const menu=document.getElementById('library-source-menu'); if(!menu||!menu.open)return;
      const panel=menu.querySelector('.source-menu-panel'), button=menu.querySelector('summary'); if(!panel||!button)return;
      const r=button.getBoundingClientRect(), h=panel.offsetHeight||180, w=panel.offsetWidth||172;
      panel.style.position='fixed'; panel.style.left=`${Math.max(8,Math.min(window.innerWidth-w-8,r.right-w))}px`; panel.style.top=`${Math.max(8,Math.min(window.innerHeight-h-8,r.top-h+2))}px`; panel.style.bottom='auto';
    }

    document.addEventListener('toggle', event => {
      const target = event.target;
      if (target && target.id === 'library-source-menu') { state.sourceMenuOpen = target.open; if (target.open) requestAnimationFrame(positionSourceMenu); }
    }, true);

    document.addEventListener('input', event => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      if (target.id === 'library-filter-input') {
        const currentValue = target.value;
        const caret = typeof target.selectionStart === 'number' ? target.selectionStart : currentValue.length;
        state.libraryQuery = currentValue;
        renderLibrary();
        renderTabs();
        const restored = document.getElementById('library-filter-input');
        if (restored) {
          restored.focus();
          try { restored.setSelectionRange(caret, caret); } catch {}
        }
      }
      if (target.id === 'home-search-input') {
        const currentValue = target.value;
        const caret = typeof target.selectionStart === 'number' ? target.selectionStart : currentValue.length;
        state.homeQuery = currentValue;
        state.homeCursor = caret;
        clearTimeout(suggestionTimer);
        suggestionTimer = setTimeout(() => updateSuggestions(currentValue, caret), 220);
      }
      // Track color picker state
      if (target.type === 'color' && target.closest('#custom-theme-overlay')) {
        colorPickerOpen = true;
        clearTimeout(window._colorPickerCloseTimer);
        window._colorPickerCloseTimer = setTimeout(() => { colorPickerOpen = false; }, 500);
      }
      if (target.dataset.action === 'custom-theme-color-input') {
        const color = normalizeHexColor(target.value);
        const hex = document.querySelector('[data-action="custom-theme-hex-input"]');
        if (hex) hex.value = color;
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color = color;
        state.settingsInfo.theme = 'custom';
        applyCustomThemeColor(color, state.settingsInfo.custom_theme_color_2 || '#fb7185', state.settingsInfo.custom_theme_use_second_color);
        applyTheme('custom');
        scheduleCustomThemeColorSave(color);
      }
      if (target.dataset.action === 'custom-theme-hex-input') {
        const raw = String(target.value || '').trim();
        applyCustomThemeColor(raw);
        if (/^#?[0-9a-fA-F]{3}$/.test(raw) || /^#?[0-9a-fA-F]{6}$/.test(raw)) {
          const color = normalizeHexColor(raw);
          const picker = document.querySelector('[data-action="custom-theme-color-input"]');
          if (picker) picker.value = color;
          if (!state.settingsInfo) state.settingsInfo = {};
          state.settingsInfo.custom_theme_color = color;
          state.settingsInfo.theme = 'custom';
          applyCustomThemeColor(color, state.settingsInfo.custom_theme_color_2 || '#fb7185', state.settingsInfo.custom_theme_use_second_color);
          applyTheme('custom');
          scheduleCustomThemeColorSave(color);
        }
      }
      if (target.dataset.action === 'custom-theme-color2-input') {
        const color = normalizeHexColor(target.value);
        const hex = document.querySelector('[data-action="custom-theme-hex2-input"]');
        if (hex) hex.value = color;
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.custom_theme_color_2 = color;
        state.settingsInfo.custom_theme_use_second_color = true;
        state.settingsInfo.theme = 'custom';
        applyTheme('custom');
        scheduleCustomThemeColorSave(state.settingsInfo.custom_theme_color || '#d946ef');
      }
      if (target.dataset.action === 'custom-theme-hex2-input') {
        const raw = String(target.value || '').trim();
        if (/^#?[0-9a-fA-F]{3}$/.test(raw) || /^#?[0-9a-fA-F]{6}$/.test(raw)) {
          const color = normalizeHexColor(raw);
          const picker = document.querySelector('[data-action="custom-theme-color2-input"]');
          if (picker) picker.value = color;
          if (!state.settingsInfo) state.settingsInfo = {};
          state.settingsInfo.custom_theme_color_2 = color;
          state.settingsInfo.custom_theme_use_second_color = true;
          state.settingsInfo.theme = 'custom';
          applyTheme('custom');
          scheduleCustomThemeColorSave(state.settingsInfo.custom_theme_color || '#d946ef');
        }
      }
      if (target.dataset.action === 'font-size-slider') {
        const size = Math.max(75, Math.min(130, Number(target.value || 100)));
        applyFontSize(size);
        const label = target.parentElement && target.parentElement.querySelector('.font-size-value');
        if (label) label.textContent = `${size}%`;
        if (!state.settingsInfo) state.settingsInfo = {};
        state.settingsInfo.font_size = size;
        apiCall('set_font_size', size).catch(() => {});
      }
      if (target.dataset.action === 'preset-rename-input') {
        event.stopPropagation();
        state.renamingPresetValue = target.value;
      }
      // Update preset preview when editing colors
      if (target.dataset.action === 'preset-edit-color' || target.dataset.action === 'preset-edit-color2') {
        const card = target.closest('.preset-card');
        if (card) {
          const c1Input = card.querySelector('[data-action="preset-edit-color"]');
          const c2Input = card.querySelector('[data-action="preset-edit-color2"]');
          if (c1Input) card.style.setProperty('--preset-color', normalizeHexColor(c1Input.value));
          if (c2Input) card.style.setProperty('--preset-color2', normalizeHexColor(c2Input.value));
        }
      }
    });

    document.addEventListener('keydown', async event => {
      const target = event.target;
      if (!(target instanceof HTMLElement)) return;
      // Enter saves in the "Save Theme" name dialog.
      if (event.key === 'Enter' && target.id === 'preset-name-input') {
        event.preventDefault();
        const saveBtn = document.querySelector('[data-action="preset-save-confirm"]');
        if (saveBtn) saveBtn.click();
        return;
      }
      // Enter saves while editing a saved theme's name.
      if (event.key === 'Enter' && target.classList.contains('preset-edit-name-input')) {
        event.preventDefault();
        const card = target.closest('[data-preset-card]');
        const saveBtn = card ? card.querySelector('[data-action="save-edit-preset"]') : null;
        if (saveBtn) saveBtn.click();
        return;
      }
      if (target.dataset.action === 'preset-rename-input') {
        // Prevent space from triggering the parent button click
        if (event.key === ' ') {
          event.stopPropagation();
          return;
        }
        if (event.key === 'Enter') {
          event.preventDefault();
          const oldName = target.dataset.oldName || '';
          const newName = target.value || '';
          if (newName.trim() && newName.trim() !== oldName) {
            await renameCustomThemePreset(oldName, newName.trim());
          } else {
            state.renamingPreset = null;
            state.renamingPresetValue = '';
            if (state.customThemeEditorOpen) { renderSettings(); renderTabs(); }
          }
        }
        if (event.key === 'Escape') {
          state.renamingPreset = null;
          state.renamingPresetValue = '';
          state.editingPresetName = null;
          renderSettings();
          renderTabs();
        }
      }
    });

    let libraryDragSelecting = false;
    let libraryDragStart = null;
    let libraryDragMode = 'select';
    let libraryDragVisited = new Set();
    function applyDragCard(card) { const id=card.dataset.libraryAppid; if(libraryDragVisited.has(id))return; libraryDragVisited.add(id); if((libraryDragMode==='select'&&!isLibrarySelected(id))||(libraryDragMode==='deselect'&&isLibrarySelected(id))){toggleLibrarySelection(id);renderLibrary();} }
    document.addEventListener('mousedown', event => { const card=event.target.closest && event.target.closest('.game-card[data-library-appid]'); if(!card||event.button!==0||event.target.closest('button'))return; libraryDragStart={x:event.clientX,y:event.clientY,card}; libraryDragSelecting=false; libraryDragVisited.clear(); });
    document.addEventListener('mousemove', event => { if(!libraryDragStart)return; if(!libraryDragSelecting && Math.hypot(event.clientX-libraryDragStart.x,event.clientY-libraryDragStart.y)>7){libraryDragSelecting=true; libraryDragMode=isLibrarySelected(libraryDragStart.card.dataset.libraryAppid)?'deselect':'select'; applyDragCard(libraryDragStart.card);} if(libraryDragSelecting){const card=event.target.closest && event.target.closest('.game-card[data-library-appid]');if(card)applyDragCard(card);} });
    document.addEventListener('mouseup', () => { libraryDragSelecting=false; libraryDragStart=null; libraryDragVisited.clear(); });

    document.addEventListener('input', async event => {
      const target = event.target;
      if (!target) return;
      if (target.id === 'add-library-search-input') {
        const raw = target.value;
        state.addLibraryQuery = raw;
        const clean = raw.trim();
        if (clean.length < 2) {
          state.addLibrarySuggestions = [];
          renderAddLibrarySuggestionsOnly();
          return;
        }
        try {
          const suggestions = await apiCall('search_suggestions', clean);
          const liveInput = document.getElementById('add-library-search-input');
          if (!liveInput || liveInput.value !== raw) return;
          state.addLibrarySuggestions = Array.isArray(suggestions) ? suggestions.slice(0, 6) : [];
          renderAddLibrarySuggestionsOnly();
        } catch {
          state.addLibrarySuggestions = [];
          renderAddLibrarySuggestionsOnly();
        }
      }
    });

    document.addEventListener('click', async event => {
      const clickedInsideSearch = event.target.closest('.search-wrap');
      if (!clickedInsideSearch && state.homeSuggestions.length) {
        state.homeSuggestions = [];
        renderHomeSuggestionsOnly();
      }
      const actionEl = event.target.closest('[data-action]');
      if (!actionEl) {
        if (event.target === $modal) {
          closeModalAnimated();
        }
        if (event.target === $confirm) {
          settleConfirm(false);
        }
        // Click on the dimmed backdrop closes these dialogs too.
        if (event.target.id === 'edit-game-overlay') {
          state.editingLibraryGameId = null;
          renderEditGameDialog();
        }
        if (event.target.id === 'add-library-overlay') {
          state.addLibraryModalOpen = false;
          renderAddLibraryDialog();
        }
        if (event.target === $selection) {
          state.bulkReviewOpen = false;
          renderSelectionReview();
        }
        if (event.target === $preset) {
          state.presetDialogOpen = false;
          renderPresetDialog();
        }
        return;
      }
      const action = actionEl.dataset.action;
      switch (action) {
        case 'confirm-ok':
          settleConfirm(true);
          break;
        case 'confirm-cancel':
          settleConfirm(false);
          break;
        case 'switch-tab':
          state.activeTab = actionEl.dataset.tab || 'home';
          renderTabs();
          updateLibraryScrollButton();
          if (state.activeTab === 'settings') {
            renderSettings();
            await refreshUpdateInfo();
          } else if (state.activeTab === 'home') {
            restoreHomeInputFocus();
          } else if (state.activeTab === 'library' && !state.libraryLoaded && !state.libraryLoading) {
            await refreshLibrary();
          }
          break;
        case 'library-scan':
          await refreshLibrary({ forceRescan: true });
          break;
        case 'library-rescan':
          await refreshLibrary({ forceRescan: true });
          break;
        case 'clear-library-sources': state.librarySourceFilter=[]; state.sourceMenuOpen=true; renderLibrary(); break;
        case 'toggle-library-source': { const source=actionEl.dataset.source||''; const current=state.librarySourceFilter||[]; state.librarySourceFilter=current.includes(source)?current.filter(x=>x!==source):[...current,source]; state.sourceMenuOpen=true; renderLibrary(); break; }
        case 'library-select-all': toggleSelectAllFiltered(); renderLibrary(); renderTabs(); break;
        case 'library-filter':
          state.libraryFilter = actionEl.dataset.filter || 'visible';
          renderLibrary();
          renderTabs();
          break;
        case 'library-clear-search':
          state.libraryQuery = '';
          renderLibrary();
          renderTabs();
          break;
        case 'edit-library-game': { state.editingLibraryGameId=String(actionEl.dataset.appid); renderEditGameDialog(); break; }
        case 'close-edit-game': { state.editingLibraryGameId=null; renderEditGameDialog(); break; }
        case 'fetch-edit-steam': {
          const appidInput = document.getElementById('edit-game-appid');
          const statusEl = document.getElementById('edit-appid-status');
          const val = appidInput ? appidInput.value.trim() : '';
          if (!val || !/^\d+$/.test(val)) {
            if (statusEl) statusEl.textContent = '(Enter numeric Steam AppID)';
            toast('Enter a numeric Steam AppID');
            break;
          }
          if (statusEl) statusEl.textContent = '(Fetching game info...)';
          const res = await apiCall('preview_game_appid', val);
          if (!res.ok) {
            if (statusEl) statusEl.textContent = '(Not found on Steam)';
            toast(res.error || 'Steam lookup failed');
            break;
          }
          const game = res.game || {};
          const nameInput = document.getElementById('edit-game-name');
          const imageInput = document.getElementById('edit-game-image');
          if (nameInput && game.name) nameInput.value = game.name;
          if (imageInput && game.header_image) imageInput.value = game.header_image;
          if (statusEl) statusEl.textContent = '✓ Game info loaded';
          toast('Steam game recognized successfully!');
          break;
        }
        case 'save-edit-game': {
          const item = state.libraryItems.find(x => String(x.appid) === String(state.editingLibraryGameId));
          if (!item) break;
          const oldId = String(item.appid);
          const name = document.getElementById('edit-game-name').value.trim();
          const appid = document.getElementById('edit-game-appid').value.trim();
          const image = document.getElementById('edit-game-image').value.trim();
          if (appid && appid !== oldId && state.libraryItems.some(x => String(x.appid) === appid)) {
            toast(`AppID ${appid} is already used by another game in your library`);
            break;
          }

        if (dragName === dropName) return;
        try {
          const r = await apiCall('reorder_custom_theme_presets', dragName, dropName);
          if (r && r.ok) {
            if (!state.settingsInfo) state.settingsInfo = {};
            state.settingsInfo.custom_theme_presets = r.custom_theme_presets || [];
            if (state.customThemeEditorOpen) renderCustomThemeEditor();
          }
        } catch {}
        dragName = null;
      });
    })();

    async function bootstrap() {
      renderAll();
      state.backendReady = await waitForBackend();
      if (!state.backendReady) {
        toast('Desktop backend not available');
        return;
      }
      try {
        await apiCall('ping');
      } catch {
        toast('Desktop backend not available');
        return;
      }
      const libraryView = document.getElementById('view-library');
      if (libraryView) {
        libraryView.addEventListener('scroll', updateLibraryScrollButton);
      }
      await loadHistory();
      await loadSettingsInfo();
      renderAll();
      renderSettings();
      updateLibraryScrollButton();
      refreshLibrary({ background: true, keepModal: false });
      checkStartupUpdateNotice();
    }

    bootstrap();
  </script>
</body>
</html>
